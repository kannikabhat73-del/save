<!DOCTYPE html>
<html>
<head>
    <title>Association of Event Management - Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center; 
            overflow:hidden;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #ff512f, #dd2476);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .circle{
            position:absolute;
            border-radius:50%;
            background: rgba(255,255,255,0.15);
            animation: float 15s infinite;
        }

        .circle:nth-child(1){
            width:120px;
            height:120px;
            top:10%;
            left:15%;
        }

        .circle:nth-child(2){
            width:200px;
            height:200px;
            bottom:10%;
            right:10%;
            animation-duration:20s;
        }

        .circle:nth-child(3){
            width:80px;
            height:80px;
            bottom:40%;
            left:60%;
            animation-duration:12s;
        }

        @keyframes float{
            0%{transform:translateY(0px);}
            50%{transform:translateY(-40px);}
            100%{transform:translateY(0px);}
        }

        .login-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
            text-align:center;
            position:relative;
            z-index:1;
        }

        .login-box h2{
            margin-bottom:10px;
            color:#1e3c72;
        }

        .login-box p{
            font-size:14px;
            color:gray;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #ccc;
        }

        input:focus{
            outline:none;
            border-color:#2a5298;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            background:#1e3c72;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1559a2;
        }

        #error{
            color:red;
            margin-top:10px;
            font-size:14px;
        }
    </style>
</head>

<body>
    
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="login-box">
        <h2>Association of Event Management</h2>
        <p>Where ideas turn into unforgettable experiences.</p>

        <form onsubmit="return validateLogin()">
            <input type="text" id="username" placeholder="Username or Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p id="error"></p>
    </div>

<script>
function validateLogin() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    if(user === "sbcdeptcs" && pass === "sbc@123") {
        window.location.href = "home.html";
        return false;
    } else {
        document.getElementById("error").innerText = "Invalid Username or Password!";
        return false;
    }
}
</script>

</body>
</html>
