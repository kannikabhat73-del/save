<!DOCTYPE html>
<html>
<head>
  <title>Trash</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">

<h1 class="text-2xl mb-4">🗑 Trash</h1>

<input type="text" id="search" placeholder="Search deleted files..."
       class="w-full p-2 mb-4 rounded text-black" oninput="loadTrash()">

<div id="loading" class="space-y-3">
  <div class="h-6 bg-gray-700 rounded animate-pulse"></div>
  <div class="h-6 bg-gray-700 rounded animate-pulse"></div>
  <div class="h-6 bg-gray-700 rounded animate-pulse"></div>
</div>

<div id="trashData"></div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyTUVFLhdHtAidGSej-AvVVyrHv0hTvKPGL0BD26L7XymMS621x0QfwU7HhC3NZg2AK/exec";

async function loadTrash() {
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("trashData").innerHTML = "";

  try {
    const res = await fetch(WEB_APP_URL + "?trash=true");
    const files = await res.json();

    let html = "";

    files.forEach(file => {
      html += `
      <div class="bg-gray-800 p-3 rounded mb-2 flex justify-between items-center">
        <div>
          <span class="text-gray-300">${file.name}</span>
          <span class="text-gray-500 ml-2">${file.date}</span>
        </div>
        <div class="flex gap-2">
          <button onclick="restore('${file.id}')" class="bg-green-500 px-3 py-1 rounded">Restore</button>
          <button onclick="deleteFile('${file.id}')" class="bg-red-500 px-3 py-1 rounded">Delete</button>
          <a href="${file.url}" target="_blank" class="bg-blue-500 px-3 py-1 rounded">Open</a>
        </div>
      </div>
      `;
    });

    document.getElementById("trashData").innerHTML = html || "No files found";

  } catch(err) {
    document.getElementById("trashData").innerHTML = "Failed to load trash";
    console.error(err);
  }

  document.getElementById("loading").classList.add("hidden");
}

async function restore(id){
  await fetch(WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify({ action: "restore", id })
  });
  loadTrash();
}

async function deleteFile(id){
  await fetch(WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify({ action: "delete", id })
  });
  loadTrash();
}

window.onload = loadTrash;
</script>

</body>
</html>
